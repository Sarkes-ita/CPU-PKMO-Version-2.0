<!DOCTYPE html>
<html>
<head>
    <title>Pokemon Calculator</title>
    <link rel="stylesheet" href="/static/style.css">
</head>
<body>
    <main>
        <form method="post">

            <section class="team-section">
                <h2>Player Team</h2>
                <div id="player-team" class="team-grid"></div>
            </section>

            <section class="team-section">
                <h2>Enemy Team</h2>
                <div id="enemy-team" class="team-grid"></div>
            </section>

            <div class="actions">
                <button type="submit">Run AI</button>
            </div>

            {% if result %} <!-- only if there is a result to show, otherwise hide the section -->
            <section class="result-section">
                <h2>AI Decision</h2>
                <p>{{ result }}</p>
            </section>
            {% endif %}

        </form>
    </main>

    <script src="/static/js/form-generator.js"></script>

</body>
</html>
